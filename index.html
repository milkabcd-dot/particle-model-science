<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעבדת החלקיקים - צביעה אינטראקטיבית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-light: #f8fafc;
    --panel: #ffffff;
    --border: #e2e8f0;
    --text-main: #1e293b;
    --text-dim: #64748b;
    --accent-cyan: #0d9488;
    --accent-yellow: #fde047;
    --accent-wrong: #f43f5e;
    --accent-right: #22c55e;
  }
  
  body {
    background-color: var(--bg-light);
    color: var(--text-main);
    font-family: 'Assistant', sans-serif;
    margin: 0;
    padding: 20px;
  }

  .wrap { max-width: 900px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-family: 'Heebo', sans-serif; color: var(--text-main); }

  .reveal-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  }

  .reveal-canvas {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 4px;
    max-width: 500px;
    margin: 0 auto;
  }

  .rc-cell {
    aspect-ratio: 1/1;
    background: #f1f5f9;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .rc-cell.colored { background: var(--accent-yellow); border-color: var(--accent-yellow); }
  .rc-cell.result-right { background: var(--accent-right); border-color: var(--accent-right); }
  .rc-cell.result-wrong { background: var(--accent-wrong); border-color: var(--accent-wrong); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
  .card { 
    background: var(--panel); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 15px; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
  }

  .hex-btn { width: 50px; height: 50px; border: none; background: none; cursor: pointer; }
  .hex-fill { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 2; }
  .hex-btn.colored .hex-fill { fill: var(--accent-yellow); stroke: var(--accent-yellow); }
  .hex-btn.result-right .hex-fill { fill: var(--accent-right); stroke: var(--accent-right); }
  .hex-btn.result-wrong .hex-fill { fill: var(--accent-wrong); stroke: var(--accent-wrong); }

  .controls { text-align: center; margin-top: 40px; }
  button { padding: 12px 30px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
  #checkBtn { background: var(--accent-cyan); color: white; }
  #resetBtn { background: #e2e8f0; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>מעבדת החלקיקים</h1>
    <p>סמנו את המשפטים הנכונים כדי לחשוף את הציור.</p>
  </header>

  <div class="reveal-panel">
    <div class="reveal-canvas" id="revealCanvas"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="controls">
    <button id="checkBtn">בדקו אותי</button>
    <button id="resetBtn">איפוס</button>
  </div>
  
  <div id="scoreBox" style="text-align:center; margin-top:20px; display:none;">
    <strong id="scoreText"></strong>
  </div>
</div>

<script>
const statements = [
  {n:13, t:"גודלו של חלקיק יחיד מפלסטיק הוא כגודל חרוז קטן.", correct:false, pos:{c:0,r:5}},
  {n:14, t:"בנוזל: החלקיקים מחליקים זה על גבי זה.", correct:true, pos:{c:7,r:0}},
  {n:16, t:"בין כל החלקיקים יש רווחים שאין בהם דבר.", correct:true, pos:{c:6,r:1}},
  {n:26, t:"למילים: ריק ואוויר יש אותה משמעות.", correct:false, pos:{c:1,r:5}},
  {n:27, t:"בכל חומר, בכל מצב צבירה, החלקיקים נעים מעצמם.", correct:true, pos:{c:7,r:1}},
  {n:30, t:"החומר שעווה הוא בין החומרים המעטים שלא בנויים מחלקיקים.", correct:false, pos:{c:2,r:5}},
  {n:15, t:"גוף האדם בנוי מחלקיקים.", correct:true, pos:{c:8,r:1}},
  {n:25, t:"לברזל במצב מוצק ולברזל במצב נוזל יש חלקיקים בגודל שונה.", correct:false, pos:{c:3,r:5}},
  {n:31, t:"חלקיקי המים שמתאדים מהרצפה נהרסים ונעלמים לגמרי מהעולם.", correct:false, pos:{c:4,r:5}},
  {n:4, t:"כשחומר הופך ממוצק לנוזל, החלקיקים עצמם הופכים לרכים יותר.", correct:false, pos:{c:5,r:5}},
  {n:12, t:"תנועת חלקיקי הגז היא חופשית ולכל הכיוונים.", correct:true, pos:{c:1,r:2}},
  {n:11, t:"בין החלקיקים במצב צבירה מוצק קיימים כוחות משיכה חזקים מאוד.", correct:true, pos:{c:2,r:2}},
  {n:10, t:"למסמר מברזל ולטבעת מברזל יש אותו סוג חלקיקים.", correct:true, pos:{c:3,r:2}},
  {n:18, t:"כשדוחסים גז בתוך מזרק סגור, מספר חלקיקי הגז לא משתנה.", correct:true, pos:{c:4,r:2}},
  {n:24, t:"חלקיקים במצב נוזל נעים בשני סוגי תנועה: תנודה וסיבוב.", correct:true, pos:{c:0,r:2}},
  {n:17, t:"התאדות מתרחשת משטח פני הנוזל בלבד.", correct:true, pos:{c:5,r:2}},
  {n:"3א", t:"נוזל מתאפיין במבנה חלקיקים מסודר.", correct:false, pos:{c:6,r:5}},
  {n:"5א", t:"ניתן לדחוס גז כי המרחק בין החלקיקים בגז הוא קטן.", correct:false, pos:{c:7,r:5}},
  {n:"3ב", t:"דבש צמיג ממים, כי בין חלקיקי הדבש קיימים כוחות משיכה חלשים.", correct:false, pos:{c:8,r:5}},
  {n:23, t:"האוויר הוא תערובת הכוללת חלקיקים מכמה סוגים.", correct:true, pos:{c:6,r:2}},
  {n:1, t:"חימום חומר יכול לגרום לחלקיקים לנוע מהר יותר.", correct:true, pos:{c:7,r:2}},
  {n:8, t:"חימום חלקיקי גז בכלי קשיח וסגור, מגדיל את ההתנגשויות.", correct:true, pos:{c:2,r:3}},
  {n:2, t:"תוספת של חלקיקי גז לכלי קשיח וסגור מקטינה את הלחץ.", correct:false, pos:{c:9,r:5}},
  {n:28, t:"שלגון מיץ קפוא הפך ממוצק לנוזל, כוחות המשיכה התחזקו.", correct:false, pos:{c:10,r:5}},
  {n:29, t:"הפיזור העצמי של חלקיקי צבע במים חמים הוא איטי יותר.", correct:false, pos:{c:11,r:5}},
  {n:7, t:"עקרונות תורת החלקיקים נוסחו לפני 2500 שנים.", correct:true, pos:{c:3,r:3}},
  {n:"5ב", t:"כשחומר משנה מצב צבירה, סוג החלקיקים משתנה.", correct:false, pos:{c:12,r:5}},
  {n:9, t:"חלקיקי בושם יכולים לפעפע בין החלקיקים שבאוויר.", correct:true, pos:{c:4,r:3}},
  {n:21, t:"החלקיקים של חומר מסוים זהים בשלושת המצבים.", correct:true, pos:{c:5,r:3}},
  {n:6, t:"פעפוע בין גזים מהיר מפעפוע בין נוזלים.", correct:true, pos:{c:6,r:3}},
  {n:22, t:"קמח חיטה הוא מוצק, בכל גרגר יש המוני חלקיקים.", correct:true, pos:{c:2,r:4}},
  {n:19, t:"גביש הוא מבנה של מוצקים בעלי סדר מרחבי.", correct:true, pos:{c:4,r:4}},
  {n:20, t:"חימום גז בכלי קשיח גורם ללחץ לגדול.", correct:true, pos:{c:6,r:4}},
];

const grid = document.getElementById('grid');
const canvas = document.getElementById('revealCanvas');

statements.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<button class="hex-btn" data-idx="${i}"><svg viewBox="0 0 54 54"><path class="hex-fill" d="M27 2 L49 14.5 L49 39.5 L27 52 L5 39.5 L5 14.5 Z"/></svg></button><span>${s.t}</span>`;
  grid.appendChild(card);
  const rc = document.createElement('div');
  rc.className = 'rc-cell';
  rc.dataset.idx = i;
  rc.style.gridColumn = (s.pos.c + 1);
  rc.style.gridRow = (s.pos.r + 1);
  canvas.appendChild(rc);
});

grid.addEventListener('click', e => {
  const btn = e.target.closest('.hex-btn');
  if(!btn) return;
  btn.classList.toggle('colored');
  document.querySelector(`.rc-cell[data-idx="${btn.dataset.idx}"]`).classList.toggle('colored', btn.classList.contains('colored'));
});

document.getElementById('checkBtn').addEventListener('click', () => {
  let right = 0;
  statements.forEach((s, i) => {
    const btn = document.querySelectorAll('.hex-btn')[i];
    const rc = document.querySelectorAll('.rc-cell')[i];
    const colored = btn.classList.contains('colored');
    if (colored && s.correct) { btn.classList.add('result-right'); rc.classList.add('result-right'); right++; }
    else if (colored && !s.correct) { btn.classList.add('result-wrong'); rc.classList.add('result-wrong'); }
  });
  document.getElementById('scoreText').textContent = `זיהיתם ${right} משפטים נכונים!`;
  document.getElementById('scoreBox').style.display = 'block';
});

document.getElementById('resetBtn').addEventListener('click', () => location.reload());
</script>
</body>
</html>
