<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg-purple: #f5f3ff;
    --border-purple: #7e22ce; /* סגול חזק למסגרת */
    --text: #4c1d95; /* טקסט סגול כהה */
    --yellow: #facc15;
    --right: #22c55e;
    --wrong: #e11d48;
  }
  body { background: var(--bg-purple); color: var(--text); font-family: 'Assistant', sans-serif; padding: 30px; margin: 0; }
  .wrap { max-width: 900px; margin: 0 auto; }
  
  h1 { font-size: 55px; color: var(--border-purple); text-align: center; margin-bottom: 10px; }
  .instruction { 
    text-align: center; font-size: 26px; font-weight: 900; 
    color: white; background: var(--border-purple); 
    padding: 15px 30px; border-radius: 50px; 
    margin-bottom: 40px; border: 4px solid #581c87;
  }
  
  .reveal-panel { background: white; border: 6px solid var(--border-purple); border-radius: 25px; padding: 30px; margin-bottom: 40px; box-shadow: 0 15px 25px rgba(0,0,0,0.1); }
  .reveal-canvas { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; max-width: 600px; margin: 0 auto; }
  .rc-cell { aspect-ratio: 1/1; background: #ddd6fe; border-radius: 4px; }
  .rc-cell.colored { background: var(--yellow); }
  .rc-cell.result-right { background: var(--right); }
  .rc-cell.result-wrong { background: var(--wrong); }

  .grid { display: grid; gap: 25px; }
  .card { 
    background: white; 
    border: 5px solid var(--border-purple); 
    border-radius: 20px; 
    padding: 30px; 
    display: flex; 
    align-items: center; 
    gap: 30px; 
    cursor: pointer;
    font-size: 26px; 
    font-weight: 800;
  }
  
  .square-btn { 
    width: 80px; height: 80px; 
    border: 5px solid var(--border-purple); 
    border-radius: 15px; 
    background: white; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 32px;
    flex-shrink: 0;
    box-shadow: 6px 6px 0px var(--border-purple);
  }
  .card.active .square-btn { background: var(--yellow); border-color: var(--yellow); }
  .card.right .square-btn { background: var(--right); border-color: var(--right); }
  .card.wrong .square-btn { background: var(--wrong); border-color: var(--wrong); }

  button.action { 
    background: var(--border-purple); color: white; 
    padding: 25px 60px; border-radius: 50px; border: none; cursor: pointer; 
    font-size: 28px; font-weight: 900; box-shadow: 0 8px 10px rgba(0,0,0,0.2); 
  }
  
  footer { margin-top: 80px; text-align: center; font-size: 24px; color: var(--border-purple); font-weight: 900; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>מעבדת החלקיקים</h1>
    <div class="instruction">סמנו ב-V את כל המשפטים ה**נכונים** בלבד!</div>
  </header>
  
  <div class="reveal-panel"><div class="reveal-canvas" id="revealCanvas"></div></div>
  <div class="grid" id="grid"></div>
  
  <div style="text-align:center; margin-top:50px;">
    <button class="action" id="checkBtn">✓ בדקו אותי</button>
  </div>
  <div id="scoreBox" style="text-align:center; margin-top:30px; font-weight:bold; font-size:28px;"></div>
  
  <footer>עריכה: מילכה ברקו גרש</footer>
</div>

<script>
const statements = [
  {n:13, t:"גודלו של חלקיק יחיד מפלסטיק הוא כגודל חרוז קטן.", correct:false, pos:{c:0,r:5}},
  {n:14, t:"בנוזל: החלקיקים מחליקים זה על גבי זה.", correct:true, pos:{c:7,r:0}},
  {n:16, t:"בין כל החלקיקים יש רווחים שאין בהם דבר.", correct:true, pos:{c:6,r:1}},
  {n:26, t:"למילים: ריק ואוויר יש אותה משמעות.", correct:false, pos:{c:1,r:5}},
  {n:27, t:"בכל חומר, בכל מצב צבירה, החלקיקים נעים מעצמם.", correct:true, pos:{c:7,r:1}},
  {n:30, t:"החומר שעווה הוא בין החומרים המעטים שלא בנויים מחלקיקים.", correct:false, pos:{c:2,r:5}},
  {n:15, t:"גוף האדם בנוי מחלקיקים.", correct:true, pos:{c:8,r:1}},
  {n:25, t:"לברזל במצב מוצק ולברזל במצב נוזל יש חלקיקים בגודל שונה.", correct:false, pos:{c:3,r:5}},
  {n:31, t:"חלקיקי המים שמתאדים מהרצפה נהרסים ונעלמים.", correct:false, pos:{c:4,r:5}},
  {n:4, t:"כשחומר הופך ממוצק לנוזל, החלקיקים עצמם הופכים לרכים יותר.", correct:false, pos:{c:5,r:5}},
  {n:12, t:"תנועת חלקיקי הגז היא חופשית ולכל הכיוונים.", correct:true, pos:{c:1,r:2}},
  {n:11, t:"בין החלקיקים במצב צבירה מוצק קיימים כוחות משיכה חזקים מאוד.", correct:true, pos:{c:2,r:2}},
  {n:10, t:"למסמר מברזל ולטבעת מברזל יש אותו סוג חלקיקים.", correct:true, pos:{c:3,r:2}},
  {n:18, t:"כשדוחסים גז בתוך מזרק סגור, מספר חלקיקי הגז לא משתנה.", correct:true, pos:{c:4,r:2}},
  {n:24, t:"חלקיקים במצב נוזל נעים בתנודה וסיבוב.", correct:true, pos:{c:0,r:2}},
  {n:17, t:"התאדות מתרחשת משטח פני הנוזל בלבד.", correct:true, pos:{c:5,r:2}},
  {n:"3א", t:"נוזל מתאפיין במבנה חלקיקים מסודר.", correct:false, pos:{c:6,r:5}},
  {n:"5א", t:"ניתן לדחוס גז כי המרחק בין החלקיקים קטן.", correct:false, pos:{c:7,r:5}},
  {n:"3ב", t:"דבש צמיג ממים בגלל כוחות משיכה חלשים.", correct:false, pos:{c:8,r:5}},
  {n:23, t:"האוויר הוא תערובת הכוללת חלקיקים מכמה סוגים.", correct:true, pos:{c:6,r:2}},
  {n:1, t:"חימום חומר גורם לחלקיקים לנוע מהר יותר.", correct:true, pos:{c:7,r:2}},
  {n:8, t:"חימום חלקיקי גז בכלי סגור מגדיל את מספר ההתנגשויות.", correct:true, pos:{c:2,r:3}},
  {n:2, t:"תוספת חלקיקי גז לכלי סגור מקטינה את הלחץ.", correct:false, pos:{c:9,r:5}},
  {n:28, t:"שלגון מיץ קפוא הפך ממוצק לנוזל - כוחות המשיכה התחזקו.", correct:false, pos:{c:10,r:5}},
  {n:29, t:"פיזור צבע במים חמים איטי יותר ממים קרים.", correct:false, pos:{c:11,r:5}},
  {n:7, t:"עקרונות תורת החלקיקים נוסחו לפני 2500 שנים.", correct:true, pos:{c:3,r:3}},
  {n:"5ב", t:"כשחומר משנה מצב צבירה, סוג החלקיקים משתנה.", correct:false, pos:{c:12,r:5}},
  {n:9, t:"חלקיקי בושם יכולים לפעפע בין חלקיקי האוויר.", correct:true, pos:{c:4,r:3}},
  {n:21, t:"החלקיקים זהים בשלושת מצבי הצבירה.", correct:true, pos:{c:5,r:3}},
  {n:6, t:"פעפוע בין גזים מהיר מפעפוע בין נוזלים.", correct:true, pos:{c:6,r:3}},
  {n:22, t:"קמח חיטה הוא מוצק, בכל גרגר יש המוני חלקיקים.", correct:true, pos:{c:2,r:4}},
  {n:19, t:"גביש הוא מבנה מוצקים בעל סדר מרחבי.", correct:true, pos:{c:4,r:4}},
  {n:20, t:"חימום גז בכלי סגור גורם ללחץ לגדול.", correct:true, pos:{c:6,r:4}},
];

const grid = document.getElementById('grid');
const canvas = document.getElementById('revealCanvas');

statements.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="square-btn">${s.n}</div><div>${s.t}</div>`;
  card.onclick = () => {
    card.classList.toggle('active');
    document.querySelector(`.rc-cell[data-idx="${i}"]`).classList.toggle('colored', card.classList.contains('active'));
  };
  grid.appendChild(card);
  const rc = document.createElement('div');
  rc.className = 'rc-cell';
  rc.dataset.idx = i;
  rc.style.gridColumn = (s.pos.c + 1);
  rc.style.gridRow = (s.pos.r + 1);
  canvas.appendChild(rc);
});

document.getElementById('checkBtn').onclick = () => {
  let right = 0;
  statements.forEach((s, i) => {
    const card = document.querySelectorAll('.card')[i];
    const rc = document.querySelectorAll('.rc-cell')[i];
    if (card.classList.contains('active')) {
      if (s.correct) { card.classList.add('right'); rc.classList.add('result-right'); right++; }
      else { card.classList.add('wrong'); rc.classList.add('result-wrong'); }
    }
  });
  document.getElementById('scoreBox').textContent = `כל הכבוד! זיהית ${right} משפטים נכונים.`;
};
</script>
</body>
</html>
